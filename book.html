<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>Book Tickets - EventiX</title>
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.0/css/all.min.css"/>
  <style>
    /* Same global styles as before */
    :root{--primary:#e91e63;--secondary:#9c27b0;--dark:#1a1a2e;--light:#f8f9fa;--accent:#ff5722;--gradient:linear-gradient(135deg,#667eea 0%,#764ba2 100%);}
    *{margin:0;padding:0;box-sizing:border-box;}
    body{font-family:'Segoe UI',sans-serif;line-height:1.6;color:#333;background:var(--light);padding-top:100px;}
    header{background:var(--gradient);color:white;padding:1rem 0;position:fixed;width:100%;top:0;z-index:1000;box-shadow:0 4px 15px rgba(0,0,0,0.2);}
    nav{max-width:1200px;margin:0 auto;display:flex;justify-content:space-between;align-items:center;padding:0 2rem;}
    .logo{font-size:2rem;font-weight:800;background:linear-gradient(to right,#ff8a00,#e52d27);-webkit-background-clip:text;-webkit-text-fill-color:transparent;}
    .nav-links{display:flex;gap:2rem;align-items:center;}
    .nav-links a{color:white;text-decoration:none;font-weight:600;transition:all .3s;position:relative;}
    .nav-links a:hover{color:var(--accent);}
    .nav-links a::after{content:'';position:absolute;width:0;height:3px;bottom:-8px;left:0;background:var(--accent);transition:width .3s;}
    .nav-links a:hover::after{width:100%;}
    .btn{display:inline-block;background:var(--accent);color:white;padding:14px 36px;border-radius:50px;text-decoration:none;font-weight:bold;font-size:1.1rem;transition:all .4s;box-shadow:0 8px 20px rgba(255,87,34,.4);}
    .btn:hover{transform:translateY(-5px);box-shadow:0 15px 30px rgba(255,87,34,.6);}
    .container{max-width:800px;margin:0 auto;padding:2rem;}
    .booking-form{background:white;padding:3rem;border-radius:20px;box-shadow:0 15px 40px rgba(0,0,0,0.1);margin:3rem 0;}
    .form-group{margin-bottom:1.5rem;}
    label{display:block;margin-bottom:0.5rem;font-weight:600;color:var(--dark);}
    input, select{width:100%;padding:12px 16px;border:2px solid #ddd;border-radius:12px;font-size:1rem;transition:border 0.3s;}
    input:focus, select:focus{outline:none;border-color:var(--primary);}
    .row{display:grid;grid-template-columns:1fr 1fr;gap:1.5rem;}
    .total-price{font-size:2rem;color:var(--primary);text-align:right;margin:2rem 0;}
    footer{background:var(--dark);color:#aaa;text-align:center;padding:3rem 0;margin-top:6rem;}
    @media(max-width:768px){.row{grid-template-columns:1fr;}}
  </style>
</head>
<body>

  <header>
    <nav>
      <div class="logo">EventiX</div>
      <div class="nav-links">
        <a href="index.html">Home</a>
        <a href="events.html">Events</a>
        <!-- <a href="about.html">About</a> -->
        <a href="contact.html">Contact</a>
        <a href="book.html" class="btn" style="background:#fff;color:var(--primary);padding:10px 20px;font-size:0.9rem;">Book Now</a>
      </div>
    </nav>
  </header>

  <div class="container">
    <h1 style="text-align:center;color:var(--dark);margin:2rem 0;">Complete Your Booking</h1>

    <div class="booking-form">
      <h2 style="margin-bottom:1.5rem;">Event: Live Concert - The Weeknd</h2>
      <form>
        <div class="row">
          <div class="form-group">
            <label>Full Name</label>
            <input type="text" required placeholder="John Doe">
          </div>
          <div class="form-group">
            <label>Email</label>
            <input type="email" required placeholder="john@example.com">
          </div>
        </div>

        <div class="row">
          <div class="form-group">
            <label>Phone Number</label>
            <input type="tel" required placeholder="+1 (555) 000-1234">
          </div>
          <div class="form-group">
            <label>Ticket Type</label>
            <select required>
              <option>General Admission - $149</option>
              <option>VIP - $299</option>
              <option>Platinum - $499</option>
            </select>
          </div>
        </div>

        <div class="row">
          <div class="form-group">
            <label>Number of Tickets</label>
            <input type="number" min="1" max="10" value="1" required>
          </div>
          <div class="form-group">
            <label>Special Requests (optional)</label>
            <input type="text" placeholder="e.g. Wheelchair access">
          </div>
        </div>

        <div class="total-price">$149.00</div>

        <button type="submit" class="btn" style="width:100%;padding:18px;font-size:1.3rem;">Complete Secure Payment</button>
      </form>
      <p style="text-align:center;margin-top:2rem;color:#666;"><i class="fas fa-lock"></i> Your payment info is encrypted and secure.</p>
    </div>
  </div>

  <footer>
    <div class="container">
      <p>© 2025 EventiX. All rights reserved. Made with ❤️ for event lovers.</p>
    </div>
  </footer>
</body>
</html>
