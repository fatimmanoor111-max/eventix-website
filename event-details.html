<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>Event Details - EventiX</title>
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.0/css/all.min.css"/>
  <style>
    :root {
      --primary: #e91e63;
      --secondary: #9c27b0;
      --dark: #1a1a2e;
      --light: #f8f9fa;
      --accent: #ff5722;
      --gradient: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
    }

    * { margin: 0; padding: 0; box-sizing: border-box; }
    body {
      font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
      line-height: 1.6;
      color: #333;
      background: var(--light);
      padding-top: 100px;
    }

    header {
      background: var(--gradient);
      color: white;
      padding: 1rem 0;
      position: fixed;
      width: 100%;
      top: 0;
      z-index: 1000;
      box-shadow: 0 4px 15px rgba(0,0,0,0.2);
    }

    nav {
      max-width: 1200px;
      margin: 0 auto;
      display: flex;
      justify-content: space-between;
      align-items: center;
      padding: 0 2rem;
    }

    .logo {
      font-size: 2rem;
      font-weight: 800;
      background: linear-gradient(to right, #ff8a00, #e52d27);
      -webkit-background-clip: text;
      -webkit-text-fill-color: transparent;
    }

    .nav-links {
      display: flex;
      gap: 2rem;
      align-items: center;
    }

    .nav-links a {
      color: white;
      text-decoration: none;
      font-weight: 600;
      transition: all 0.3s;
      position: relative;
    }

    .nav-links a:hover { color: var(--accent); }
    .nav-links a::after {
      content: ''; position: absolute; width: 0; height: 3px; bottom: -8px; left: 0;
      background: var(--accent); transition: width 0.3s;
    }
    .nav-links a:hover::after { width: 100%; }

    .btn {
      display: inline-block;
      background: var(--accent);
      color: white;
      padding: 14px 36px;
      border-radius: 50px;
      text-decoration: none;
      font-weight: bold;
      font-size: 1.1rem;
      transition: all 0.4s;
      box-shadow: 0 8px 20px rgba(255,87,34,0.4);
    }
    .btn:hover {
      transform: translateY(-5px);
      box-shadow: 0 15px 30px rgba(255,87,34,0.6);
    }
    
    .btn.big {
        padding: 18px 45px;
    }

    .container { max-width: 1200px; margin: 0 auto; padding: 0 2rem; }

    footer {
      background: var(--dark);
      color: #aaa;
      text-align: center;
      padding: 3rem 0;
      margin-top: 4rem;
    }
  </style>
</head>
<body>

  <header>
    <nav>
      <div class="logo">EventiX</div>
      <div class="nav-links">
        <a href="index.html">Home</a>
        <a href="events.html">Events</a>
        <a href="contact.html">Contact</a>
        <a href="book.html" class="btn" style="background:#fff;color:var(--primary);padding:10px 20px;font-size:0.9rem;">Book Now</a>
      </div>
    </nav>
  </header>

  <div id="eventDetail" class="container" style="min-height: 60vh; padding-top: 3rem;">
    <h1 style="text-align:center; margin-top:5rem;">Loading Event Details...</h1>
  </div>

  <footer>
    <div class="container">
      <p>© 2025 EventiX. All rights reserved. Made with ❤️ for event lovers.</p>
    </div>
  </footer>

  <script src="events-data.js"></script>
</body>
</html>
